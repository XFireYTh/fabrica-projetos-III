<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SUS+</title>
        <link rel="stylesheet" href="CSS/style.css">
        <link rel="stylesheet" href="CSS/inicialstyle.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <header>
            <div class="organizador">
                <div class="inicial w-25 d-flex">
                    <img height="80%" src="resources/images/logo_sus 2.png" alt="logo-sus-plus">
                </div>
                <div class="login">
                    <a href="#"><img height="60px" src="resources/images/avatar.png" alt="login-user-photo"></a>
                </div>
            </div>
        </header>
        <nav></nav>
        <main>
            <div class="conteudo">
                <div class="anuncios">

                    <img src="resources/images/Group 20.png" alt="Anuncio-Test">
                </div>
                <div class="concientizacao">
                    <a href="./conscientizacao/" class="config_link" id="conscientizacao">
                        <div class="opcaocons" id="cssid_opc1">
                            <img class="icon_cons" src="resources/images/advertising.png" alt="advertising">
                            <div class="central_info">
                                <p class="title_cons">Conscientização</p>
                                <p class="desc_cons">Fique atento aos perigos cotidianos</p>
                            </div>
                        </div>
                    </a>
                    <a href="agendamento/" class="config_link" id="agendamento">
                        <div class="opcaocons" id="cssid_opc2">
                            <img src="resources/images/calendar.png" alt="advertising">
                            <div class="central_info">
                                <p class="title_cons">Agendamentos</p>
                                <p class="desc_cons">Organize e realize agendamentos</p>
                            </div>
                        </div>
                    </a>
                    <a href="agendamento/urgencia/" class="config_link" id="urgencia">
                        <div class="opcaocons" id="cssid_opc3">
                            <img src="resources/images/siren.png" alt="advertising">
                            <div class="central_info">
                                <p class="title_cons">Urgência</p>
                                <p class="desc_cons">Inicie o atendimento de urgênica</p>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="agenda_resumo">
                    <div class="age_cal" id="calendario_id">
                        <div class="head_resumo" id="r_cal">
                            <h3 class="nome_resumo">Calendário</h3>
                            <h4 id="mes_resumo"></h4>
                        </div>
                        <table id="calendario">
                            <thead>
                                <th>Dom</th>
                                <th>Seg</th>
                                <th>Ter</th>
                                <th>Qua</th>
                                <th>Qui</th>
                                <th>Sex</th>
                                <th>Sab</th>
                            </thead>
                            <tbody id="dias_resumo">
                                <!-- Tudo aqui é gerado via Javascript -->
                            </tbody>
                        </table>
                    </div>
                    <div class="age_cal" id="agenda_id">
                        <div class="head_resumo" id="r_age">
                            <h3 class="nome_resumo">Agenda</h3>
                        </div>
                        <ul class="agendamento"></ul>
                    </div>
                </div>
            </div>
        </main>
        <footer></footer>


        <script src="js/script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
